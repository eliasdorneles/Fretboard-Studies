<!DOCTYPE html>
<html>
    <head>
        <title>Fretboard Studies</title>
        <meta charset='utf-8' />
	<script src="boxfrets.js" defer></script>
	<style>
	    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;700&display=swap');

	    :root {
	        --bg-page: #f0ece6;
	        --bg-fretboard: #fffdf8;
	        --border-fretboard: #bbb;
	        --cell-border: #333;
	        --string-color: #888;
	        --text-color: #222;
	        --input-bg: #fff;
	        --tab-bg: #eee;
	        --tab-active-bg: #fff;
	        --tab-border: #ccc;
	        --tab-text: inherit;
	        --tab-active-text: inherit;

	        --game-note-color: #005580;
	        --game-label-color: #666;
	        --game-sublabel-color: #888;
	        --game-timer-color: #222;
	        --game-score-color: #555;
	        --game-btn-bg: #005580;
	        --game-btn-text: #fff;
	        --game-btn-hover: #007ab8;
	        --game-results-bg: #f0f0f0;
	        --game-results-border: #ccc;
	        --game-results-text: #333;
	        --game-results-strong: #111;
	        --game-results-em: #666;
	        --game-results-li: #555;
	        --game-target-highlight: rgba(0, 100, 200, 0.10);

	        --piano-white-bg: #faf8f2;
	        --piano-white-border: #888;
	        --piano-white-text: #555;
	        --piano-black-bg: #1a1510;
	        --piano-black-border: #000;
	        --piano-black-text: #c8b896;
	        --piano-white-hover: #fff;
	        --piano-black-hover: #2e2318;
	        --piano-correct-bg: #c8e8c0;
	        --piano-wrong-bg: #f0ccc8;
	        --piano-black-correct-bg: #2a5020;
	        --piano-black-wrong-bg: #501818;
	    }

	    body.dark-theme {
	        --bg-page: #0e0b08;
	        --bg-fretboard: #2c1e12;
	        --border-fretboard: #5a3e28;
	        --cell-border: #4a3020;
	        --string-color: #8a6040;
	        --tab-bg: #1a120a;
	        --tab-active-bg: #0e0b08;
	        --tab-border: #3d2a1a;
	        --text-color: #c8b896;
	        --input-bg: #1a120a;
	        --tab-text: #7a6040;
	        --tab-active-text: #f0e4c8;

	        --game-note-color: #d4902a;
	        --game-label-color: #6b5040;
	        --game-sublabel-color: #8a7060;
	        --game-timer-color: #f0e4c8;
	        --game-score-color: #8a7060;
	        --game-btn-bg: #d4902a;
	        --game-btn-text: #1c1510;
	        --game-btn-hover: #e8a535;
	        --game-results-bg: #2a1f15;
	        --game-results-border: #3d2a1a;
	        --game-results-text: #c0aa88;
	        --game-results-strong: #f0e4c8;
	        --game-results-em: #8a7060;
	        --game-results-li: #a08060;
	        --game-target-highlight: rgba(212, 144, 42, 0.15);

	        --piano-white-bg: #e8dfc8;
	        --piano-white-border: #5a3e28;
	        --piano-white-text: #4a3020;
	        --piano-black-bg: #0e0a06;
	        --piano-black-border: #2a1a0a;
	        --piano-black-text: #d4902a;
	        --piano-white-hover: #f0e8d0;
	        --piano-black-hover: #1a1208;
	        --piano-correct-bg: #b0d8a0;
	        --piano-wrong-bg: #d8a898;
	        --piano-black-correct-bg: #203818;
	        --piano-black-wrong-bg: #381010;
	    }

	    * { margin:0; padding:0; border-spacing:0; }
	    body { font-family:sans-serif; font-size:100%; background: var(--bg-page); color: var(--text-color); transition: background-color 0.25s, color 0.25s; }
	    #diagram_title { background: var(--input-bg); color: var(--text-color); }
	    #fretboard { display:grid; position:absolute; top:110px; left:10px; background: var(--bg-fretboard); border:1px solid var(--border-fretboard); box-sizing:border-box; transition: background-color 0.25s, border-color 0.25s; }
	    .fretboard-cell { border-right:1px solid var(--cell-border) !important; background-color:transparent !important; height:34px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold; cursor:pointer; box-sizing:border-box; position:relative; z-index:1; }
	    .fretboard-cell:hover { outline:2px dotted #555; outline-offset:-2px; }
	    .fretboard-cell:not(.transparent)::before { content:''; position:absolute; width:min(calc(100% - 4px), 40px); height:26px; top:50%; left:50%; transform:translate(-50%,-50%); border-radius:5px; background-color:var(--fret-bg); border:2px solid var(--fret-border); box-sizing:border-box; z-index:1; }
	    .fretboard-cell span.note { position:relative; z-index:2; }
	    .fretboard-cell.has-marker.transparent::after { content:''; position:absolute; width:15px; height:15px; background:#aaa; border-radius:50%; bottom:-7.5px; left:50%; transform:translateX(-50%); pointer-events:none; z-index:2; }
	    .string-line { position:absolute; left:0; right:0; background: var(--string-color); pointer-events:none; z-index:0; }
	    .fretboard-cell.open-string { border-right: 6px solid var(--cell-border) !important; }
	    .orange { --fret-bg:#ffbb67; --fret-border:#543d22; background-color:#ffbb67; border-color:#543d22; color:#543d22 !important; }
	    .green  { --fret-bg:#669999; --fret-border:#003333; background-color:#669999; border-color:#003333; color:#003333 !important; }
	    .blue   { --fret-bg:#333745; --fret-border:#afcded; background-color:#333745; border-color:#afcded; color:#afcded !important; }
	    .yellow { --fret-bg:#f6f792; --fret-border:#4c4c2d; background-color:#f6f792; border-color:#4c4c2d; color:#4c4c2d !important; }
	    .coffee { --fret-bg:#daede2; --fret-border:#000000; background-color:#daede2; border-color:#000000; color:#000000 !important; }
	    .red    { --fret-bg:#ea2e49; --fret-border:#400d14; background-color:#ea2e49; border-color:#400d14; color:#400d14 !important; }
	    .blank  { background-color:#dddddd !important; border-color:#333333 !important; color:#333333 !important; }
	    .white  { background-color:#ffffff !important; border-color:#111111 !important; color:#111111 !important; }
	    .transparent { color:transparent !important }
	    input.color_button { width:40px; border-radius: 5px; }
	    div#main { height:340px; margin:10px; }
	    #diagram_title { font-size:25px; font-weight:bold; margin:15px; display:block; padding:4px; border:0; width:100%; }
	    #form_controls { padding:10px; text-align: center; }
	    #checkanswer { display:none; }
	    #message { text-align: right; }
	    #examples strong { display: block; margin-bottom: 2px; }
	    #examples ul { display: inline-block; text-align: left; margin: 0; }
	    #tool-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 10px; }
	    .row-label { font-size: 13px; color: var(--game-label-color); margin-right: 2px; }
	    .row-sep { width: 1px; height: 20px; background: var(--tab-border); margin: 0 4px; }
	    #clear, #eraser { font-weight: bold; padding: 2px 6px; }
	    #share-controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 4px 0 12px; }
	    #share-controls a.share-btn { border: 1px solid var(--tab-border); border-radius: 3px; padding: 4px 12px; font-size: 13px; color: var(--text-color); text-decoration: none; transition: border-color 0.15s, color 0.15s; }
	    #share-controls a.share-btn:hover { border-color: #0088cc; color: #0088cc; text-decoration: none; }
	    a:focus { outline: thin dotted #333; outline: 5px auto -webkit-focus-ring-color; outline-offset: -2px; }
	    a:hover, a:active { outline: 0; }
	    a { color: #0088cc; text-decoration: none; }
	    a:hover { color: #005580; text-decoration: underline; }

	    @media print { #form_controls { display:none; } }

	    /* Tabs */
	    #mode-tabs { display: flex; align-items: flex-end; padding: 8px 10px 0; border-bottom: 1px solid var(--tab-border); background: var(--bg-page); transition: background-color 0.25s, border-color 0.25s; }
	    .mode-tab { padding: 6px 16px; cursor: pointer; border: 1px solid var(--tab-border);
	                border-bottom: none; background: var(--tab-bg); margin-right: 4px; color: var(--tab-text); }
	    .mode-tab.active { background: var(--tab-active-bg); color: var(--tab-active-text); font-weight: bold; }
	    #theme-toggle {
	        margin-left: auto; background: none; border: none; cursor: pointer;
	        font-size: 18px; padding: 4px 10px 8px; color: var(--tab-text, #666);
	        opacity: 0.65; line-height: 1; align-self: center;
	    }
	    #theme-toggle:hover { opacity: 1; }

	    /* Game panel */
	    #game-panel { padding: 24px 24px 32px; text-align: center; }

	    /* Challenge block */
	    #game-challenge { text-align: center; margin-bottom: 20px; }
	    .game-label { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--game-label-color); margin-bottom: 4px; }
	    #target-note {
	        display: block;
	        font-family: 'Playfair Display', Georgia, serif;
	        font-size: 96px; font-weight: 700; line-height: 1;
	        color: var(--game-note-color);
	        margin: 8px 0;
	        transition: opacity 0.15s;
	    }
	    .game-sublabel { font-size: 16px; color: var(--game-sublabel-color); letter-spacing: 0.04em; }

	    /* Status row */
	    #game-status { display: flex; align-items: baseline; justify-content: center; gap: 24px; margin-bottom: 16px; }
	    #game-timer {
	        font-family: 'JetBrains Mono', 'Courier New', monospace;
	        font-size: 48px; font-weight: 700; color: var(--game-timer-color);
	        transition: color 0.3s;
	    }
	    #game-timer.urgent { color: #e05030; }
	    #game-score { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 20px; color: var(--game-score-color); }

	    /* Start/Stop/Play Again button */
	    #game-start-btn {
	        background: var(--game-btn-bg); color: var(--game-btn-text);
	        border: none; border-radius: 3px; cursor: pointer;
	        padding: 10px 28px; font-size: 13px; font-weight: 700;
	        letter-spacing: 0.12em; text-transform: uppercase;
	    }
	    #game-start-btn:hover { background: var(--game-btn-hover); }

	    /* Target string highlight */
	    .target-string { background-color: var(--game-target-highlight) !important; }

	    /* Hide note names during game */
	    body.game-mode .fretboard-cell span.note { visibility: hidden; }

	    /* Results */
	    #game-results {
	        margin-top: 20px; padding: 20px 24px;
	        background: var(--game-results-bg); border: 1px solid var(--game-results-border); border-radius: 4px;
	        font-family: 'JetBrains Mono', 'Courier New', monospace;
	        font-size: 14px; color: var(--game-results-text); line-height: 1.8;
	    }
	    #game-results strong { color: var(--game-results-strong); }
	    #game-results em { color: var(--game-results-em); font-style: normal; letter-spacing: 0.05em; }
	    #game-results ul { margin: 4px 0 0 0; list-style: none; }
	    #game-results li { color: var(--game-results-li); }

	    /* Name the Note panel */
	    #name-note-panel { padding: 24px 24px 32px; text-align: center; }
	    #name-challenge { text-align: center; margin-bottom: 20px; }
	    #name-status { display: flex; align-items: baseline; justify-content: center; gap: 24px; margin-bottom: 16px; }
	    #name-timer { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 48px; font-weight: 700; color: var(--game-timer-color); transition: color 0.3s; }
	    #name-timer.urgent { color: #e05030; }
	    #name-score { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 20px; color: var(--game-score-color); }
	    #name-start-btn { background: var(--game-btn-bg); color: var(--game-btn-text); border: none; border-radius: 3px; cursor: pointer; padding: 10px 28px; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
	    #name-start-btn:hover { background: var(--game-btn-hover); }
	    #name-results { margin-top: 20px; padding: 20px 24px; background: var(--game-results-bg); border: 1px solid var(--game-results-border); border-radius: 4px; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 14px; color: var(--game-results-text); line-height: 1.8; }
	    #name-results strong { color: var(--game-results-strong); }
	    #name-results em { color: var(--game-results-em); font-style: normal; letter-spacing: 0.05em; }
	    #name-results ul { margin: 4px 0 0 0; list-style: none; }
	    #name-results li { color: var(--game-results-li); }

	    /* Piano keyboard */
	    #note-keyboard { position: relative; display: flex; margin: 16px auto 20px; width: 322px; user-select: none; }
	    .white-key { width: 46px; height: 130px; background: var(--piano-white-bg); border: 1px solid var(--piano-white-border); border-radius: 0 0 4px 4px; color: var(--piano-white-text); font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11px; font-weight: 700; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; cursor: pointer; box-sizing: border-box; position: relative; z-index: 1; transition: background 0.08s; }
	    .white-key:hover { background: var(--piano-white-hover); }
	    .black-key { position: absolute; top: 0; width: 30px; height: 80px; background: var(--piano-black-bg); border: 1px solid var(--piano-black-border); border-radius: 0 0 3px 3px; color: var(--piano-black-text); font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 9px; font-weight: 700; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; cursor: pointer; box-sizing: border-box; z-index: 2; transition: background 0.08s; }
	    .black-key:hover { background: var(--piano-black-hover); }
	    .piano-key.correct-flash { background: var(--piano-correct-bg) !important; }
	    .black-key.correct-flash { background: var(--piano-black-correct-bg) !important; }
	    .piano-key.wrong-flash { background: var(--piano-wrong-bg) !important; }
	    .black-key.wrong-flash { background: var(--piano-black-wrong-bg) !important; }

	    /* Single-cell target highlight */
	    .target-cell::after { content: ''; position: absolute; inset: 2px; border: 2px solid var(--game-note-color); border-radius: 4px; pointer-events: none; z-index: 3; box-shadow: 0 0 8px var(--game-note-color); animation: pulse-cell 1s ease-in-out infinite; }
	    @keyframes pulse-cell { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
	</style>
    </head>
    <body>
	<nav id="mode-tabs">
	  <button class="mode-tab active" data-mode="diagram">Diagram</button>
	  <button class="mode-tab" data-mode="find-note">Find the Note</button>
  <button class="mode-tab" data-mode="name-note">Name the Note</button>
	  <button id="theme-toggle" title="Toggle dark/light theme">&#9790;</button>
	</nav>
	<input id="diagram_title" type="text" value="Click to add a title..." />
	<div id="main">
		<div id="message">&nbsp;</div>
	</div>
	<div id="name-note-panel" style="display:none">
	  <div id="name-challenge">
	    <div class="game-label">what note is this?</div>
	    <div class="game-sublabel" id="name-string-label">on the &mdash; string</div>
	  </div>
	  <div id="name-status">
	    <span id="name-timer">1:00</span>
	    <span id="name-score">&#x2713; 0 &nbsp; &#x2717; 0</span>
	  </div>
	  <div id="note-keyboard">
	    <button class="piano-key white-key" data-note="C">C</button>
	    <button class="piano-key white-key" data-note="D">D</button>
	    <button class="piano-key white-key" data-note="E">E</button>
	    <button class="piano-key white-key" data-note="F">F</button>
	    <button class="piano-key white-key" data-note="G">G</button>
	    <button class="piano-key white-key" data-note="A">A</button>
	    <button class="piano-key white-key" data-note="B">B</button>
	    <button class="piano-key black-key" data-note="C#" style="left:32px">C#</button>
	    <button class="piano-key black-key" data-note="D#" style="left:78px">D#</button>
	    <button class="piano-key black-key" data-note="F#" style="left:170px">F#</button>
	    <button class="piano-key black-key" data-note="G#" style="left:216px">G#</button>
	    <button class="piano-key black-key" data-note="A#" style="left:262px">A#</button>
	  </div>
	  <button id="name-start-btn">Start</button>
	  <div id="name-results" style="display:none"></div>
	</div>
	<div id="game-panel" style="display:none">
	  <div id="game-challenge">
	    <div class="game-label">find the note</div>
	    <span id="target-note">--</span>
	    <div class="game-sublabel">on the highlighted string</div>
	  </div>
	  <div id="game-status">
	    <span id="game-timer">1:00</span>
	    <span id="game-score">&#x2713; 0 &nbsp; &#x2717; 0</span>
	  </div>
	  <button id="game-start-btn">Start</button>
	  <div id="game-results" style="display:none"></div>
	</div>
	<div id="form_controls">
		<div id="tool-row">
			<span class="row-label">Palette</span>
			<input type="button" value="&nbsp;" class="color_button green" />
			<input type="button" value="&nbsp;" class="color_button yellow" />
			<input type="button" value="&nbsp;" class="color_button blue" />
			<input type="button" value="&nbsp;" class="color_button coffee" />
			<input type="button" value="&nbsp;" class="color_button red" />
			<input type="button" value="&nbsp;" class="color_button orange" />
			<span class="row-sep"></span>
			<input id="clear" type="button" value="Clear" class="blank" />
			<input id="eraser" type="button" value="Eraser" class="blank" />
		</div>
		<div id="share-controls">
			<a id="linkthis" class="share-btn" href="javascript:void(0)" title="Copy a shareable link to this diagram">Copy link</a>
			<a id="linkquiz" class="share-btn" href="javascript:void(0)" title="Copy a link where viewers mark notes and check their answers — great for exercises">Share as quiz</a>
			<a id="restart" href="javascript:void(0)">Reset</a>
		</div>
		<input type="button" id="checkanswer" class="coffee" value="Check answer!" /><br />
		<div id="examples"><strong>Examples:</strong>
			<ul>
				<li><a href="#strings=6:1,18:1;11:1;3:1,15:1;8:1;1:1,13:1;6:1,18:1&diagram_title=Bb%20octaves">Bb octaves</a></li>
				<li><a href="#strings=0:2,3:2,8:2,12:2,15:2;1:2,5:2,8:2,13:2;0:2,5:2,9:2,12:2;2:2,5:2,10:2,14:2;3:2,7:2,10:2,15:2;0:2,3:2,8:2,12:2,15:2&diagram_title=C%20major%20along%20the%20fretboard">C major all along the fretboard</a></li>
				<li><a href="#strings=3:3;2:0;3:0;2:0;;3:0&diagram_title=Gdim%20fingering">Gdim fingering</a></li>
				<li><a href="#strings=0:4,2:3,5:3,7:2,10:3,12:3,14:3;0:2,3:3,5:3,7:3,10:3,12:2,15:3;2:3,4:2,7:3,9:3,11:3,14:3;0:4,2:3,4:3,7:3,9:2,12:3,14:3;0:4,2:2,5:3,7:3,9:3,12:3,14:2;0:4,2:3,5:3,7:2,10:3,12:3,14:3&diagram_title=B%20minor%20pentatonic">B minor pentatonic</a></li>
			</ul>
		</div>
	</div>
    </body>
</html>
